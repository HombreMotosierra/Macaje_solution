spring.datasource.url=jdbc:postgresql://localhost:5432/Macaje
spring.datasource.username=postgres
spring.datasource.password=0

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── SECURITY ─────────────────────────────────────────────────────────────────
# IMPORTANT: Change app.jwt.secret to a long random value before deploying.
# Recommended: generate with: openssl rand -base64 48
# You can also override via environment variable: APP_JWT_SECRET=...
app.jwt.secret=MACAJE_JWT_SECRET_2026_CHANGE_THIS
app.jwt.expiration-millis=28800000

# CORS: list the exact origins that should be allowed to call /api/**
# In production replace with your real frontend domain, e.g. https://tudominio.com
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

app.upload.dir=uploads
app.public.base-url=http://localhost:8080
app.upload.max-mb=20

# Upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=30MB

# Email notifications (set app.mail.enabled=true and configure SMTP to activate)
app.mail.enabled=false
app.mail.from=no-reply@macaje.local

# Uncomment and configure to enable email notifications:
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true